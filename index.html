<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Parking Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #fff;
    overflow: hidden;
  }

  #ui {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 640px;
    padding: 12px 0 8px;
    gap: 12px;
  }

  #ui h1 {
    font-size: 18px;
    font-weight: 600;
    color: #e0e0ff;
    letter-spacing: 0.5px;
  }

  .stat {
    font-size: 13px;
    color: #aaa;
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 6px 14px;
    text-align: center;
  }
  .stat span { display: block; font-size: 17px; font-weight: 600; color: #fff; margin-top: 2px; }

  canvas {
    border: 2px solid #2a2a5a;
    border-radius: 4px;
    cursor: none;
    display: block;
  }

  #controls {
    display: flex;
    gap: 24px;
    padding: 10px 0 4px;
    font-size: 12px;
    color: #666;
  }

  #controls kbd {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    font-size: 11px;
    color: #aaa;
    margin-right: 4px;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }

  #overlay h2 { font-size: 32px; font-weight: 700; color: #e0e0ff; }
  #overlay p  { font-size: 15px; color: #aaa; max-width: 340px; text-align: center; line-height: 1.6; }

  #overlay button {
    margin-top: 8px;
    background: #3a3aff;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 36px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #overlay button:hover { background: #5252ff; }

  #levelBadge {
    font-size: 13px;
    color: #5252ff;
    background: #16213e;
    border: 1px solid #3a3aff55;
    border-radius: 8px;
    padding: 6px 14px;
    text-align: center;
  }
  #levelBadge span { display: block; font-size: 17px; font-weight: 600; color: #7878ff; margin-top: 2px; }
</style>
</head>
<body>

<div id="ui">
  <h1>🚗 Car Parking</h1>
  <div id="levelBadge">Level <span id="levelNum">1</span></div>
  <div class="stat">Score <span id="scoreNum">0</span></div>
  <div class="stat">Time <span id="timerNum">60</span></div>
  <div class="stat">Lives <span id="livesNum">3</span></div>
</div>

<canvas id="c" width="640" height="480"></canvas>

<div id="controls">
  <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> to drive</div>
</div>

<div id="overlay">
  <h2>🚗 Car Parking</h2>
  <p>Drive your car into the highlighted parking spot. Avoid collisions with parked cars and walls. Each level gets harder!</p>
  <button id="startBtn">Start Game</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay   = document.getElementById('overlay');
const startBtn  = document.getElementById('startBtn');
const scoreEl   = document.getElementById('scoreNum');
const timerEl   = document.getElementById('timerNum');
const livesEl   = document.getElementById('livesNum');
const levelEl   = document.getElementById('levelNum');

let keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

// ---- Game state ----
let score, lives, timeLeft, level, gameRunning, animId;
let timerInterval;

// ---- Car ----
const CAR_W = 30, CAR_H = 50;

let car = {};

function resetCar() {
  car = {
    x: 60, y: 60,
    angle: 0,       // radians
    speed: 0,
    maxSpeed: 3.5,
    accel: 0.12,
    friction: 0.06,
    turnSpeed: 0.045,
    w: CAR_W, h: CAR_H,
  };
}

// ---- Parking spot ----
let spot = {};
let parked = false;
let parkTimer = 0;
const PARK_HOLD = 90; // frames to hold inside spot

// ---- Obstacles ----
let obstacles = [];

// ---- Level config ----
const LEVELS = [
  { numObs: 3, timeBonus: 60, spotAngle: 0 },
  { numObs: 5, timeBonus: 55, spotAngle: Math.PI / 2 },
  { numObs: 7, timeBonus: 50, spotAngle: 0 },
  { numObs: 9, timeBonus: 45, spotAngle: Math.PI / 2 },
  { numObs: 11, timeBonus: 40, spotAngle: Math.PI / 4 },
];

function getLevelConfig(lvl) {
  return LEVELS[Math.min(lvl - 1, LEVELS.length - 1)] || LEVELS[LEVELS.length - 1];
}

// ---- Layout ----
const MARGIN = 30;
const ROAD_COLOR     = '#1e2a3a';
const STRIPE_COLOR   = '#2a3d55';
const LINE_COLOR     = '#3a5070';
const OBS_COLORS     = ['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085'];

// ---- Helpers ----
function rectCorners(x, y, w, h, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  const hw = w / 2, hh = h / 2;
  const pts = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  return pts.map(([px, py]) => ({
    x: x + px * cos - py * sin,
    y: y + px * sin + py * cos,
  }));
}

function projectOntoAxis(corners, ax, ay) {
  let min = Infinity, max = -Infinity;
  for (const c of corners) {
    const d = c.x * ax + c.y * ay;
    if (d < min) min = d;
    if (d > max) max = d;
  }
  return { min, max };
}

function satCollide(c1, c2) {
  const all = [c1, c2];
  for (const corners of all) {
    for (let i = 0; i < corners.length; i++) {
      const a = corners[i], b = corners[(i + 1) % corners.length];
      const ax = -(b.y - a.y), ay = b.x - a.x;
      const len = Math.sqrt(ax*ax + ay*ay);
      const nx = ax/len, ny = ay/len;
      const p1 = projectOntoAxis(c1, nx, ny);
      const p2 = projectOntoAxis(c2, nx, ny);
      if (p1.max < p2.min || p2.max < p1.min) return false;
    }
  }
  return true;
}

function randBetween(a, b) { return a + Math.random() * (b - a); }

function spawnLevel() {
  const cfg = getLevelConfig(level);
  resetCar();
  parked = false;
  parkTimer = 0;

  // Parking spot
  spot = {
    x: randBetween(W/2, W - 80),
    y: randBetween(H/2, H - 80),
    angle: cfg.spotAngle,
    w: CAR_W + 14, h: CAR_H + 14,
    glow: 0,
  };

  // Obstacles - random parked cars, avoiding car start & spot
  obstacles = [];
  let tries = 0;
  while (obstacles.length < cfg.numObs && tries < 300) {
    tries++;
    const ox = randBetween(MARGIN + 20, W - MARGIN - 20);
    const oy = randBetween(MARGIN + 20, H - MARGIN - 20);
    const oa = Math.random() < 0.5 ? 0 : Math.PI / 2;
    const oc = OBS_COLORS[Math.floor(Math.random() * OBS_COLORS.length)];

    // Min distance from car start
    if (Math.hypot(ox - car.x, oy - car.y) < 90) continue;
    // Min distance from spot
    if (Math.hypot(ox - spot.x, oy - spot.y) < 80) continue;
    // Overlap with existing obstacles
    const newCorners = rectCorners(ox, oy, CAR_W, CAR_H, oa);
    let overlap = false;
    for (const ob of obstacles) {
      const obCorners = rectCorners(ob.x, ob.y, CAR_W, CAR_H, ob.angle);
      if (satCollide(newCorners, obCorners)) { overlap = true; break; }
    }
    if (overlap) continue;

    obstacles.push({ x: ox, y: oy, angle: oa, w: CAR_W, h: CAR_H, color: oc });
  }
}

// ---- Drawing ----
function drawBackground() {
  ctx.fillStyle = ROAD_COLOR;
  ctx.fillRect(0, 0, W, H);

  // Road stripes
  ctx.setLineDash([20, 14]);
  ctx.strokeStyle = STRIPE_COLOR;
  ctx.lineWidth = 1.5;

  for (let x = 0; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 80) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Border walls
  ctx.strokeStyle = LINE_COLOR;
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, W - 4, H - 4);
}

function drawSpot() {
  const { x, y, w, h, angle } = spot;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Glow pulse
  spot.glow = (spot.glow + 0.05) % (Math.PI * 2);
  const alpha = 0.25 + 0.15 * Math.sin(spot.glow);

  ctx.fillStyle = parked ? `rgba(39,174,96,${alpha + 0.2})` : `rgba(52,152,219,${alpha})`;
  ctx.fillRect(-w/2, -h/2, w, h);

  ctx.strokeStyle = parked ? '#27ae60' : '#3498db';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(-w/2, -h/2, w, h);
  ctx.setLineDash([]);

  // P label
  ctx.fillStyle = parked ? '#27ae60' : '#3498db';
  ctx.font = 'bold 18px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('P', 0, 0);

  ctx.restore();
}

function drawCar(x, y, angle, color1, color2, isPlayer) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const w = CAR_W, h = CAR_H;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(3, 5, w/2+2, h/2+2, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = color1;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, [5,5,3,3]);
  ctx.fill();

  // Roof
  ctx.fillStyle = color2;
  ctx.beginPath();
  ctx.roundRect(-w/2+4, -h/2+10, w-8, h-22, 4);
  ctx.fill();

  // Front windshield
  ctx.fillStyle = 'rgba(120,200,255,0.4)';
  ctx.beginPath();
  ctx.roundRect(-w/2+5, -h/2+6, w-10, 12, 2);
  ctx.fill();

  // Rear windshield
  ctx.fillStyle = 'rgba(120,200,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(-w/2+5, h/2-18, w-10, 10, 2);
  ctx.fill();

  // Headlights (front)
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.ellipse(-w/2+5, -h/2+4, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w/2-5, -h/2+4, 4, 3, 0, 0, Math.PI*2); ctx.fill();

  // Taillights (rear)
  ctx.fillStyle = '#ef5350';
  ctx.beginPath(); ctx.ellipse(-w/2+5, h/2-4, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w/2-5, h/2-4, 4, 3, 0, 0, Math.PI*2); ctx.fill();

  // Wheels
  const wheelPositions = [[-w/2-2,-h/2+8],[w/2+2,-h/2+8],[-w/2-2,h/2-8],[w/2+2,h/2-8]];
  ctx.fillStyle = '#222';
  for (const [wx, wy] of wheelPositions) {
    ctx.beginPath(); ctx.ellipse(wx, wy, 5, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    ctx.stroke();
  }

  if (isPlayer) {
    // Player highlight border
    ctx.strokeStyle = 'rgba(255,255,100,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(-w/2, -h/2, w, h, [5,5,3,3]);
    ctx.stroke();
  }

  ctx.restore();
}

function drawParkProgress() {
  if (!parked || parkTimer <= 0) return;
  const pct = parkTimer / PARK_HOLD;
  const bx = spot.x - 30, by = spot.y + spot.h/2 + 12;
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.roundRect(bx, by, 60, 8, 4); ctx.fill();
  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.roundRect(bx, by, 60 * pct, 8, 4); ctx.fill();
}

function draw() {
  drawBackground();
  drawSpot();

  for (const ob of obstacles) {
    drawCar(ob.x, ob.y, ob.angle, ob.color, darken(ob.color, 0.6), false);
  }

  drawCar(car.x, car.y, car.angle, '#f1c40f', '#f39c12', true);
  drawParkProgress();
}

function darken(hex, factor) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.floor(((n >> 16) & 0xff) * factor);
  const g = Math.floor(((n >> 8)  & 0xff) * factor);
  const b = Math.floor(( n        & 0xff) * factor);
  return `rgb(${r},${g},${b})`;
}

// ---- Physics ----
function update() {
  if (!gameRunning) return;

  const up    = keys['ArrowUp']    || keys['w'] || keys['W'];
  const down  = keys['ArrowDown']  || keys['s'] || keys['S'];
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];

  // Acceleration
  if (up)   car.speed = Math.min(car.maxSpeed, car.speed + car.accel);
  if (down) car.speed = Math.max(-car.maxSpeed * 0.6, car.speed - car.accel);

  // Friction
  if (!up && !down) {
    if (Math.abs(car.speed) < car.friction) car.speed = 0;
    else car.speed -= Math.sign(car.speed) * car.friction;
  }

  // Turning (only when moving)
  if (Math.abs(car.speed) > 0.05) {
    const turn = car.turnSpeed * (car.speed / car.maxSpeed);
    if (left)  car.angle -= turn;
    if (right) car.angle += turn;
  }

  // Move
  const dx = Math.sin(car.angle) * car.speed;
  const dy = -Math.cos(car.angle) * car.speed;
  let nx = car.x + dx;
  let ny = car.y + dy;

  // Wall collision
  const hw = CAR_W / 2, hh = CAR_H / 2;
  const margin = 4;
  if (nx - hw < margin || nx + hw > W - margin || ny - hh < margin || ny + hh > H - margin) {
    car.speed *= -0.4;
    onCollision();
    return;
  }

  // Obstacle collision
  const carCorners = rectCorners(nx, ny, car.w, car.h, car.angle);
  for (const ob of obstacles) {
    const obCorners = rectCorners(ob.x, ob.y, ob.w, ob.h, ob.angle);
    if (satCollide(carCorners, obCorners)) {
      car.speed *= -0.4;
      onCollision();
      return;
    }
  }

  car.x = nx;
  car.y = ny;

  // Check parking
  const spotCorners = rectCorners(spot.x, spot.y, spot.w, spot.h, spot.angle);
  const inSpot = satCollide(carCorners, spotCorners);

  // Check angle alignment (within ~25 degrees)
  const angleDiff = Math.abs(((car.angle - spot.angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2));
  const aligned = angleDiff < 0.45 || angleDiff > Math.PI * 2 - 0.45 ||
                  Math.abs(angleDiff - Math.PI) < 0.45;
  const slow = Math.abs(car.speed) < 1.2;

  parked = inSpot && aligned && slow;

  if (parked) {
    parkTimer = Math.min(PARK_HOLD, parkTimer + 1);
    if (parkTimer >= PARK_HOLD) {
      levelComplete();
    }
  } else {
    parkTimer = Math.max(0, parkTimer - 2);
  }
}

let collisionCooldown = 0;

function onCollision() {
  if (collisionCooldown > 0) return;
  collisionCooldown = 40;
  lives--;
  livesEl.textContent = lives;
  if (lives <= 0) {
    gameOver();
  }
}

function levelComplete() {
  gameRunning = false;
  clearInterval(timerInterval);
  const bonus = timeLeft * 10;
  score += 100 + bonus;
  scoreEl.textContent = score;
  level++;
  levelEl.textContent = level;

  showOverlay('🎉 Parked!', `+100 base + ${bonus} time bonus!`, 'Next Level');
}

function gameOver() {
  gameRunning = false;
  clearInterval(timerInterval);
  showOverlay('💥 Game Over', `Final score: ${score}`, 'Play Again');
}

function showOverlay(title, msg, btn) {
  overlay.querySelector('h2').textContent = title;
  overlay.querySelector('p').textContent = msg;
  overlay.querySelector('button').textContent = btn;
  overlay.style.display = 'flex';
}

function startGame() {
  score = 0; lives = 3; timeLeft = 60; level = 1;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  timerEl.textContent = timeLeft;
  levelEl.textContent = level;
  overlay.style.display = 'none';
  spawnLevel();
  startTimer();
  gameRunning = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function startNextLevel() {
  const cfg = getLevelConfig(level);
  timeLeft = cfg.timeBonus;
  timerEl.textContent = timeLeft;
  overlay.style.display = 'none';
  spawnLevel();
  startTimer();
  gameRunning = true;
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) gameOver();
      else {
        timeLeft = 30;
        timerEl.textContent = timeLeft;
      }
    }
  }, 1000);
}

function loop() {
  if (collisionCooldown > 0) collisionCooldown--;
  update();
  draw();

  // Flash car on recent collision
  if (collisionCooldown > 0 && Math.floor(collisionCooldown / 6) % 2 === 0) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ff0000';
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);
    ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
    ctx.restore();
  }

  animId = requestAnimationFrame(loop);
}

// ---- Overlay button ----
startBtn.addEventListener('click', () => {
  const btnText = startBtn.textContent;
  if (btnText === 'Play Again' || btnText === 'Start Game') {
    startGame();
  } else if (btnText === 'Next Level') {
    startNextLevel();
  }
});

// ---- Initial draw ----
drawBackground();
</script>
</body>
</html>
